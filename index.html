<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project Hub</title>
    <style>
        :root {
            --bg-color: #0a0a0c;
            --card-bg: #16161a;
            --card-hover: #1f1f24;
            --text-main: #ffffff;
            --text-dim: #a1a1aa;
            --accent: #3bf65ac4;
            --border: #27272a;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 2rem 1rem;
        }

        header {
            text-align: center;
            margin-bottom: 3rem;
        }

        header h1 {
            font-size: 2rem;
            letter-spacing: -0.025em;
            margin-bottom: 0.5rem;
        }

        header p {
            color: var(--text-dim);
            font-size: 1rem;
        }

        /* Responsive Grid */
        .grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr); /* 2 cols on mobile */
            gap: 1rem;
            width: 100%;
            max-width: 800px;
        }

        /* Desktop Adjustments */
        @media (min-width: 640px) {
            .grid {
                grid-template-columns: repeat(3, 1fr);
                gap: 1.5rem;
            }
        }

        .app-card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 1.5rem;
            padding: 2rem 1rem;
            text-decoration: none;
            color: inherit;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
        }

        .app-card:hover {
            background: var(--card-hover);
            transform: translateY(-4px);
            border-color: var(--accent);
        }

        .icon-wrapper {
            width: 64px;
            height: 64px;
            margin-bottom: 1rem;
            color: var(--accent);
        }

        .app-card span {
            font-weight: 500;
            font-size: 1.1rem;
        }

        svg {
            width: 100%;
            height: 100%;
            fill: none;
            stroke: currentColor;
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        footer {
            margin-top: auto;
            padding-top: 4rem;
            color: var(--text-dim);
            font-size: 0.875rem;
        }
    </style>
</head>
